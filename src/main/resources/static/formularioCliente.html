<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario cliente - STEM Gym</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <header class="site-header">
        <div class="brand">
            <a href="index.html" class="brand-link-index">
                <span class="brand-logo"><img
                        src="https://logowik.com/content/uploads/images/gym-bodybuilding-fitness-center1722634605.logowik.com.webp" /></span>
                <span class="brand-name">STEM GYM</span>
            </a>
        </div>

        <nav class="site-nav">
            <a class="site-nav__link" href="index.html">Inicio</a>
            <a class="site-nav__link" href="clientes.html">Clientes</a>
            <a class="site-nav__link" href="musculos.html">Músculos</a>
            <a class="site-nav__link" href="ejercicios.html">Ejercicios</a>
        </nav>
    </header>
    <main>
        <div id="zonaBotonAtras"></div>
        <!--FORMULARIO PARA CLIENTE-->
        <div class="contenedor-formulario">
            <h1 id="tituloFormularioCliente"></h1>
            <form class="formulario" id="formCliente">
                <label class="formulario-label" for="nombre">NOMBRE DEL CLIENTE</label>
                <input class="formulario-input" name="nombre" id="nombre" placeholder="Ej: Pedro Gómez" required><br><br>
                <label class="formulario-label" for="edad">EDAD</label>
                <input class="formulario-input" name="edad" id="edad" type="number" step="1" min="18" max="120" required><br><br>
                <label class="formulario-label" for="generosPosibles">GÉNERO</label>
                <select class="desplegable" name="generosPosibles" id="generosPosibles" required>
                    <option value="Hombre">Hombre</option>
                    <option value="Mujer">Mujer</option>
                    <option value="Otro">Otro</option>
                </select>
                <label class="formulario-label" for="pesoActual">PESO ACTUAL</label>
                <input class="formulario-input" name="pesoActual" id="pesoActual" type="number" min="30" max="350" step="0.1"
                    required><br><br>
                <label class="formulario-label" for="pesoObjetivo">PESO OBJETIVO</label>
                <input class="formulario-input" name="pesoObjetivo" id="pesoObjetivo" type="number" min="45" max="110"
                    step="0.1" required><br><br>
                <label class="formulario-label" for="avatar">IMAGEN PARA EL AVATAR</label>
                <input class="formulario-input" name="avatar" id="avatar" type="url" placeholder="https://ejemplo.com" required><br><br>
                <button class="actualizar-crear" id="botonFormularioEjercicio"></button>
            </form>
        </div>
    </main>
    <footer class="site-footer">
        <div class="site-footer-enlaces">
            <a href="https://www.instagram.com/balancegymboutique/" Target="_blank" class="site-footer-enlace"><img
                    src="https://static.vecteezy.com/system/resources/thumbnails/065/386/519/small/instagram-letter-white-logo-icon-ig-app-transparent-background-premium-social-media-design-for-digital-download-free-png.png" /></a>
            <a href="https://x.com/_gimnasio" Target="_blank" class="site-footer-enlace"><img
                    src="https://upload.wikimedia.org/wikipedia/commons/5/57/X_logo_2023_%28white%29.png?utm_source=commons.wikimedia.org&utm_campaign=index&utm_content=original" /></a>
            <a href="https://www.youtube.com/@GymDirectOfficiel" Target="_blank" class="site-footer-enlace"><img
                    src="https://static.vecteezy.com/system/resources/thumbnails/065/386/839/small/youtube-icon-white-logo-yt-app-editable-transparent-background-premium-social-media-design-for-digital-download-free-png.png" /></a>
        </div>
        <a href="mailto:contacto@stemgym.com" class="site-footer-texto">Contacto: contacto@stemgym.com</a>
    </footer>
</body>
<script type="module" src="pages/formularioCliente.js"></script>

</html>
