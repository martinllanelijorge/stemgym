</head>

<body>
    <header class="site-header">
        <div class="brand">
            <a href="index.html" class="brand-link-index">
                <span class="brand-logo"><img
                        src="https://logowik.com/content/uploads/images/gym-bodybuilding-fitness-center1722634605.logowik.com.webp" /></span>
                <span class="brand-name">STEM GYM</span>
            </a>
        </div>

        <nav class="site-nav">
            <a class="site-nav__link" href="index.html">Inicio</a>
            <a class="site-nav__link" href="clientes.html">Clientes</a>

            <a class="site-nav__link" href="ejercicios.html">Ejercicios</a>
        </nav>
    </header>
    <main>
        <div id="zonaBotonAtras"></div>
        <!--FORMULARIO PARA EJERCICIO-->
        <div class="contenedor-formulario">
            <h1 id="tituloFormularioEjercicio"></h1>
            <form class="formulario" id="formEjercicio">
                <label class="formulario-label" for="nombre">NOMBRE DEL EJERCICIO</label>
                <input class="formulario-input" name="nombre" id="nombre" placeholder="Ej: press banca" required><br><br>
                <label class="formulario-label" for="descripcion">DESCRIPCIÓN</label>
                <input class="formulario-input" name="descripcion" id="descripcion" placeholder="Se realiza tumbado ..." maxlength="1000" rows="4" required><br><br>
                <label class="formulario-label" for="edad">MATERIALES</label>
                <input class="formulario-input" name="materiales" id="materiales" placeholder="Mancuernas, banco, barra ..." maxlength="255" required><br><br>
                <label class="formulario-label" for="urlImagen">IMAGEN URL</label>
                <input class="formulario-input" name="urlImagen" id="urlImagen" type="url" placeholder="https://ejemplo.com" required><br><br>
                <label class="formulario-label" for="urlImagen">VIDEO URL</label>
                <input class="formulario-input" name="urlImagen" id="urlImagen" type="url" placeholder="https://ejemplo.com" required><br><br>
                <button class="actualizar-crear" id="botonFormularioEjercicio"></button>
            </form>
        </div>
    </main>
    <footer class="site-footer">

            <a href="https://www.youtube.com/@GymDirectOfficiel" Target="_blank" class="site-footer-enlace"><img
                    src="https://static.vecteezy.com/system/resources/thumbnails/065/386/839/small/youtube-icon-white-logo-yt-app-editable-transparent-background-premium-social-media-design-for-digital-download-free-png.png" /></a>
        </div>
        <a href="mailto:contacto@stemgym.com" class="site-footer-texto">Contacto: contacto@stemgym.com</a>
